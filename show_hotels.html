<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotelFinder — Toate Hotelurile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:       #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim:   rgba(201,168,76,0.13);
    --gold-line:  rgba(201,168,76,0.25);
    --black:      #080808;
    --dark:       #0F0F0F;
    --dark2:      #161616;
    --dark3:      #1E1E1E;
    --dark4:      #272727;
    --text:       #EDE8DE;
    --text-muted: #8A7D65;
    --text-faint: #4A4035;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Montserrat', sans-serif;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--gold-line); }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--text); font-family: var(--sans); font-weight: 300; min-height: 100vh; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 68px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 3rem;
    background: rgba(8,8,8,0.96); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--gold-line);
  }
  .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .nav-actions { display: flex; gap: 10px; }
  .btn-ghost { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); padding: 8px 18px; border: 1px solid var(--gold-line); border-radius: 1px; text-decoration: none; transition: all 0.2s; background: transparent; cursor: pointer; }
  .btn-ghost:hover { background: var(--gold-dim); }
  .btn-gold { font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--black); padding: 9px 20px; background: var(--gold); border: 1px solid var(--gold); border-radius: 1px; text-decoration: none; transition: all 0.2s; cursor: pointer; }
  .btn-gold:hover { background: var(--gold-light); }

  /* ── PAGE HEADER ── */
  .page-hero {
    margin-top: 68px; padding: 3.5rem 3rem 2.5rem;
    background: var(--dark2); border-bottom: 1px solid var(--gold-line);
    position: relative; overflow: hidden;
  }
  .page-hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 50% 100% at 80% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
  }
  .page-hero-content { position: relative; z-index: 1; }
  .page-eyebrow { font-size: 9px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .page-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--gold-line); }
  .page-title { font-family: var(--serif); font-size: 42px; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 8px; }
  .page-title em { font-style: italic; color: var(--gold); }
  .page-sub { font-size: 12px; font-weight: 300; color: var(--text-muted); }
  .page-count { font-family: var(--serif); font-size: 15px; color: var(--gold); margin-top: 4px; }

  /* ── SEARCH BAR ── */
  .search-wrap {
    background: var(--dark2); border-bottom: 1px solid var(--gold-line);
    padding: 0 3rem; position: sticky; top: 68px; z-index: 50;
  }
  .search-inner { display: flex; align-items: stretch; gap: 0; height: 56px; }
  .search-field {
    flex: 1; background: transparent; border: none; border-right: 1px solid var(--gold-line);
    outline: none; padding: 0 20px;
    font-family: var(--sans); font-size: 12px; font-weight: 300;
    color: var(--text);
  }
  .search-field::placeholder { color: var(--text-faint); }
  .search-select {
    background: transparent; border: none; border-right: 1px solid var(--gold-line);
    outline: none; padding: 0 16px;
    font-family: var(--sans); font-size: 11px; font-weight: 300;
    color: var(--text-muted); cursor: pointer; min-width: 160px;
  }
  .search-select option { background: var(--dark2); color: var(--text); }
  .search-btn {
    background: var(--gold); border: none; padding: 0 28px;
    font-family: var(--sans); font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--black); cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--gold-light); }
  .clear-btn {
    background: transparent; border: none; border-left: 1px solid var(--gold-line);
    padding: 0 16px; font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-faint); cursor: pointer;
    transition: color 0.2s; white-space: nowrap;
  }
  .clear-btn:hover { color: var(--gold); }

  /* ── LAYOUT ── */
  .page-body { display: flex; min-height: calc(100vh - 68px); }

  /* ── SIDEBAR FILTERS ── */
  .filters-sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--dark2); border-right: 1px solid var(--gold-line);
    padding: 2rem 1.5rem;
    position: sticky; top: 124px; height: calc(100vh - 124px); overflow-y: auto;
  }
  .filter-section { margin-bottom: 2rem; }
  .filter-title {
    font-size: 9px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .filter-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-line); }

  /* Price range */
  .price-range { display: flex; flex-direction: column; gap: 10px; }
  .price-inputs { display: flex; gap: 8px; align-items: center; }
  .price-input {
    flex: 1; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1px; outline: none; padding: 8px 10px;
    font-family: var(--sans); font-size: 12px; font-weight: 300; color: var(--text);
    transition: border-color 0.2s;
  }
  .price-input:focus { border-color: var(--gold-line); }
  .price-sep { font-size: 11px; color: var(--text-faint); flex-shrink: 0; }

  /* Stars filter */
  .stars-filter { display: flex; flex-direction: column; gap: 6px; }
  .star-option {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 8px 10px; border-radius: 1px; border: 1px solid transparent;
    transition: all 0.2s;
  }
  .star-option:hover { background: var(--dark3); border-color: rgba(255,255,255,0.05); }
  .star-option.active { background: var(--gold-dim); border-color: var(--gold-line); }
  .star-option input { display: none; }
  .star-check {
    width: 14px; height: 14px; border-radius: 1px; border: 1px solid var(--text-faint);
    display: flex; align-items: center; justify-content: center; font-size: 9px;
    flex-shrink: 0; transition: all 0.2s;
  }
  .star-option.active .star-check { border-color: var(--gold); color: var(--gold); }
  .star-label { font-size: 12px; font-weight: 300; color: var(--text-muted); display: flex; gap: 3px; }
  .star-label span { color: var(--gold); font-size: 11px; }

  /* Location filter */
  .location-list { display: flex; flex-direction: column; gap: 4px; }
  .location-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; cursor: pointer; border-radius: 1px;
    border: 1px solid transparent; transition: all 0.2s;
    font-size: 11px; font-weight: 300; color: var(--text-muted);
  }
  .location-item:hover { background: var(--dark3); }
  .location-item.active { background: var(--gold-dim); border-color: var(--gold-line); color: var(--gold); }
  .location-count { font-size: 10px; color: var(--text-faint); }

  /* Sort */
  .sort-select {
    width: 100%; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1px; outline: none; padding: 10px 12px;
    font-family: var(--sans); font-size: 11px; font-weight: 300;
    color: var(--text); cursor: pointer;
  }
  .sort-select option { background: var(--dark2); }

  /* Apply button */
  .btn-apply {
    width: 100%; background: var(--gold); border: none; border-radius: 1px;
    padding: 12px; font-family: var(--sans); font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--black);
    cursor: pointer; transition: all 0.2s; margin-top: 6px;
  }
  .btn-apply:hover { background: var(--gold-light); }
  .btn-reset {
    width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 1px; padding: 10px; font-family: var(--sans); font-size: 10px;
    font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint); cursor: pointer; transition: all 0.2s; margin-top: 6px;
  }
  .btn-reset:hover { border-color: var(--gold-line); color: var(--text-muted); }

  /* ── MAIN CONTENT ── */
  .hotels-main { flex: 1; padding: 2rem 2.5rem; min-width: 0; }

  /* Results header */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .results-info { font-size: 11px; font-weight: 300; color: var(--text-muted); }
  .results-info strong { color: var(--gold); font-weight: 500; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1px; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-faint); transition: all 0.2s;
  }
  .view-btn.active { border-color: var(--gold-line); color: var(--gold); background: var(--gold-dim); }
  .view-btn:hover { border-color: var(--gold-line); color: var(--gold); }

  /* ── HOTEL GRID ── */
  .hotels-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 14px; margin-bottom: 2rem;
  }
  .hotels-grid.list-view { grid-template-columns: 1fr; }

  .hotel-card {
    background: var(--dark2); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 1px; overflow: hidden; cursor: pointer;
    transition: border-color 0.25s, transform 0.25s;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
  .hotel-card:hover { border-color: var(--gold-line); transform: translateY(-2px); }

  /* grid view card */
  .card-img { height: 190px; overflow: hidden; position: relative; }
  .card-img-inner {
    width: 100%; height: 100%;
    background-size: cover; background-position: center;
    transition: transform 0.5s ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; opacity: 0.25;
  }
  .hotel-card:hover .card-img-inner { transform: scale(1.04); }
  .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,8,0.65) 0%, transparent 55%); }
  .card-badges { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; }
  .badge { font-size: 8px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 9px; border-radius: 1px; }
  .badge-gold { background: var(--gold); color: var(--black); }
  .badge-dark { background: rgba(8,8,8,0.85); color: var(--gold); border: 1px solid var(--gold-line); }
  .card-stars { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 2px; }
  .star { color: var(--gold); font-size: 10px; }
  .star.empty { color: var(--text-faint); }

  .card-body { padding: 18px 18px 16px; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card-location { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }
  .card-location::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
  .card-rating { display: flex; align-items: center; gap: 4px; }
  .rating-val { font-size: 11px; font-weight: 500; color: var(--gold); }
  .rating-cnt { font-size: 9px; color: var(--text-faint); }
  .card-name { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
  .card-desc { font-size: 11px; font-weight: 300; color: var(--text-muted); line-height: 1.7; margin-bottom: 14px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
  .price-from { font-size: 8px; letter-spacing: 0.1em; color: var(--text-faint); }
  .price-amount { font-family: var(--serif); font-size: 24px; font-weight: 300; color: var(--gold); }
  .price-night { font-size: 9px; color: var(--text-faint); }
  .card-actions { display: flex; gap: 6px; }
  .btn-details {
    background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 1px;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    text-decoration: none;
  }
  .btn-details:hover { border-color: var(--gold-line); color: var(--gold); }
  .btn-reserve {
    font-family: var(--sans); font-size: 9px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--black); background: var(--gold);
    border: 1px solid var(--gold); border-radius: 1px; padding: 0 14px; height: 32px;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
    display: flex; align-items: center;
  }
  .btn-reserve:hover { background: var(--gold-light); }

  /* LIST VIEW */
  .hotels-grid.list-view .hotel-card { display: flex; }
  .hotels-grid.list-view .card-img { width: 220px; flex-shrink: 0; height: auto; min-height: 160px; }
  .hotels-grid.list-view .card-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .hotels-grid.list-view .card-name { font-size: 24px; }

  /* ── EMPTY / LOADER ── */
  .state-box {
    grid-column: 1 / -1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 5rem 2rem; text-align: center; gap: 16px;
  }
  .state-icon { font-size: 48px; opacity: 0.2; }
  .state-title { font-family: var(--serif); font-size: 26px; font-weight: 300; color: var(--text-muted); }
  .state-sub { font-size: 12px; font-weight: 300; color: var(--text-faint); }
  .loader-ring { width: 40px; height: 40px; border: 1px solid var(--gold-line); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PAGINATION ── */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 1rem; }
  .page-btn {
    width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.07); border-radius: 1px;
    background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    font-family: var(--sans);
  }
  .page-btn:hover { border-color: var(--gold-line); color: var(--gold); }
  .page-btn.active { background: var(--gold); border-color: var(--gold); color: var(--black); font-weight: 500; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── PAGE LOADER ── */
  .page-loader { position: fixed; inset: 0; z-index: 500; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.5s; }
  .page-loader.hidden { opacity: 0; pointer-events: none; }
  .loader-text-small { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }

  /* ── ACTIVE FILTERS PILLS ── */
  .active-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-pill {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px;
    background: var(--gold-dim); border: 1px solid var(--gold-line); border-radius: 1px;
    font-size: 10px; font-weight: 500; color: var(--gold); letter-spacing: 0.08em;
  }
  .filter-pill-x { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; font-size: 12px; }
  .filter-pill-x:hover { opacity: 1; }

  @media (max-width: 1100px) {
    .hotels-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
  @media (max-width: 900px) {
    nav { padding: 0 1.5rem; }
    .nav-links { display: none; }
    .search-wrap { padding: 0 1.5rem; }
    .page-hero { padding: 2.5rem 1.5rem 2rem; }
    .page-body { flex-direction: column; }
    .filters-sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--gold-line); padding: 1.5rem; }
    .hotels-main { padding: 1.5rem; }
    .hotels-grid { grid-template-columns: 1fr; }
    .hotels-grid.list-view .card-img { width: 140px; }
  }
</style>
</head>
<body>

<div class="page-loader" id="page-loader">
  <div class="loader-ring"></div>
  <div class="loader-text-small">Se încarcă hotelurile</div>
</div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Hotel<span>Finder</span></a>
  <div class="nav-links">
    <a href="index.html">Acasă</a>
    <a href="show_hotels.html" class="active">Hoteluri</a>
  </div>
  <div class="nav-actions" id="nav-actions">
    <a href="login.html" class="btn-ghost">Autentificare</a>
    <a href="register.html" class="btn-gold">Cont nou</a>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-content">
    <div class="page-eyebrow">Colecția noastră</div>
    <div class="page-title">Toate <em>Hotelurile</em></div>
    <div class="page-sub">Explorează întreaga colecție și găsește experiența perfectă pentru tine.</div>
    <div class="page-count" id="page-count"></div>
  </div>
</div>

<!-- SEARCH BAR -->
<div class="search-wrap">
  <div class="search-inner">
    <input class="search-field" type="text" id="search-input"
           placeholder="Caută după nume sau locație..."
           oninput="applyFilters()">
    <select class="search-select" id="sort-select" onchange="applyFilters()">
      <option value="default">Sortare implicită</option>
      <option value="price-asc">Preț: mic → mare</option>
      <option value="price-desc">Preț: mare → mic</option>
      <option value="rating-desc">Rating: cel mai bun</option>
      <option value="name-asc">Nume: A → Z</option>
    </select>
    <button class="search-btn" onclick="applyFilters()">Caută</button>
    <button class="clear-btn" onclick="resetAll()">Resetează</button>
  </div>
</div>

<div class="page-body">

  <!-- FILTERS SIDEBAR -->
  <div class="filters-sidebar">

    <div class="filter-section">
      <div class="filter-title">Preț / noapte</div>
      <div class="price-range">
        <div class="price-inputs">
          <input class="price-input" type="number" id="price-min" placeholder="Min RON" min="0" oninput="applyFilters()">
          <span class="price-sep">—</span>
          <input class="price-input" type="number" id="price-max" placeholder="Max RON" min="0" oninput="applyFilters()">
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Clasificare</div>
      <div class="stars-filter" id="stars-filter">
        <label class="star-option" onclick="toggleStar(5, this)">
          <input type="checkbox" value="5">
          <div class="star-check"></div>
          <div class="star-label">
            <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
            &nbsp;5 stele
          </div>
        </label>
        <label class="star-option" onclick="toggleStar(4, this)">
          <input type="checkbox" value="4">
          <div class="star-check"></div>
          <div class="star-label">
            <span>★</span><span>★</span><span>★</span><span>★</span>
            &nbsp;4 stele
          </div>
        </label>
        <label class="star-option" onclick="toggleStar(3, this)">
          <input type="checkbox" value="3">
          <div class="star-check"></div>
          <div class="star-label">
            <span>★</span><span>★</span><span>★</span>
            &nbsp;3 stele
          </div>
        </label>
        <label class="star-option" onclick="toggleStar(2, this)">
          <input type="checkbox" value="2">
          <div class="star-check"></div>
          <div class="star-label">
            <span>★</span><span>★</span>
            &nbsp;2 stele
          </div>
        </label>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Locație</div>
      <div class="location-list" id="location-list">
        <!-- populated by JS -->
      </div>
    </div>

    <button class="btn-reset" onclick="resetAll()">Șterge toate filtrele</button>
  </div>

  <!-- HOTELS MAIN -->
  <div class="hotels-main">

    <!-- Active filters -->
    <div class="active-filters" id="active-filters"></div>

    <!-- Results header -->
    <div class="results-header">
      <div class="results-info" id="results-info">Se încarcă...</div>
      <div class="view-toggle">
        <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="view-btn" id="list-btn" onclick="setView('list')" title="Listă">☰</button>
      </div>
    </div>

    <!-- Hotels grid -->
    <div class="hotels-grid" id="hotels-grid">
      <div class="state-box">
        <div class="loader-ring"></div>
        <div class="state-sub">Se încarcă hotelurile...</div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

  </div>
</div>

<script>
  let allHotels    = [];
  let filtered     = [];
  let selectedStars= new Set();
  let selectedLoc  = null;
  let currentView  = 'grid';
  let currentPage  = 1;
  const PER_PAGE   = 9;

  // ── INIT ──
  async function init() {
    try {
      const s = await fetch('api/auth/check_session.php').then(r => r.json()).catch(() => ({ logged_in: false }));
      updateNav(s);
    } catch(e) {}

    await loadHotels();
    document.getElementById('page-loader').classList.add('hidden');

    // Preia query din URL daca vine de pe homepage (search)
    const urlParams = new URLSearchParams(window.location.search);
    const q = urlParams.get('q');
    if (q) {
      document.getElementById('search-input').value = q;
      applyFilters();
    }
  }

  function updateNav(s) {
    const el = document.getElementById('nav-actions');
    if (s && s.logged_in) {
      el.innerHTML = s.role === 'admin'
        ? `<a href="admin_dashboard.html" class="btn-ghost">Dashboard</a><a href="api/auth/logout.php" class="btn-gold">Deconectare</a>`
        : `<a href="my_account.html" class="btn-ghost">Contul meu</a><a href="api/auth/logout.php" class="btn-gold">Deconectare</a>`;
    }
  }

  // ── LOAD ──
  async function loadHotels() {
    try {
      const r    = await fetch('api/Hotels/get_hotels.php');
      const text = await r.text();
      const raw  = JSON.parse(text);
      allHotels  = Array.isArray(raw) ? raw : (raw.hotels || raw.data || []);

      document.getElementById('page-count').textContent = allHotels.length + ' hoteluri disponibile';

      buildLocationFilter();
      applyFilters();
    } catch(e) {
      console.error('loadHotels:', e);
      document.getElementById('hotels-grid').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠</div>
          <div class="state-title">Eroare la încărcare</div>
          <div class="state-sub">${e.message}</div>
        </div>`;
    }
  }

  // ── BUILD LOCATION FILTER ──
  function buildLocationFilter() {
    const counts = {};
    allHotels.forEach(h => {
      const loc = (h.location || 'Altele').split(',')[0].trim();
      counts[loc] = (counts[loc] || 0) + 1;
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const container = document.getElementById('location-list');
    container.innerHTML = sorted.map(([loc, cnt]) => `
      <div class="location-item" onclick="toggleLocation('${loc}', this)">
        <span>${loc}</span>
        <span class="location-count">${cnt}</span>
      </div>`).join('');
  }

  // ── APPLY FILTERS ──
  function applyFilters() {
    const q       = document.getElementById('search-input').value.trim().toLowerCase();
    const priceMin= parseFloat(document.getElementById('price-min').value) || 0;
    const priceMax= parseFloat(document.getElementById('price-max').value) || Infinity;
    const sort    = document.getElementById('sort-select').value;

    filtered = allHotels.filter(h => {
      const price = parseFloat(String(h.price || 0).replace(',', '.')) || 0;
      const stars = parseInt(h.stars) || 4;
      const loc   = (h.location || '').split(',')[0].trim();

      if (q && !((h.name||'').toLowerCase().includes(q) || (h.location||'').toLowerCase().includes(q) || (h.description||'').toLowerCase().includes(q))) return false;
      if (price < priceMin || price > priceMax) return false;
      if (selectedStars.size > 0 && !selectedStars.has(stars)) return false;
      if (selectedLoc && loc !== selectedLoc) return false;
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      const pa = parseFloat(String(a.price||0).replace(',','.')) || 0;
      const pb = parseFloat(String(b.price||0).replace(',','.')) || 0;
      const ra = parseFloat(a.avg_rating) || 0;
      const rb = parseFloat(b.avg_rating) || 0;
      if (sort === 'price-asc')   return pa - pb;
      if (sort === 'price-desc')  return pb - pa;
      if (sort === 'rating-desc') return rb - ra;
      if (sort === 'name-asc')    return (a.name||'').localeCompare(b.name||'');
      return 0;
    });

    currentPage = 1;
    renderActivePills();
    renderResults();
    renderPagination();
  }

  // ── RENDER ──
  function renderResults() {
    const grid  = document.getElementById('hotels-grid');
    const info  = document.getElementById('results-info');
    const start = (currentPage - 1) * PER_PAGE;
    const page  = filtered.slice(start, start + PER_PAGE);

    grid.className = 'hotels-grid' + (currentView === 'list' ? ' list-view' : '');

    info.innerHTML = `<strong>${filtered.length}</strong> hotel${filtered.length !== 1 ? 'uri' : ''} găsite`;

    if (!page.length) {
      grid.innerHTML = `
        <div class="state-box">
          <div class="state-icon">◎</div>
          <div class="state-title">Niciun hotel găsit</div>
          <div class="state-sub">Încearcă să modifici filtrele sau termenul de căutare.</div>
        </div>`;
      return;
    }

    grid.innerHTML = page.map((h, i) => hotelCard(h, i)).join('');
  }

  function hotelCard(h, i) {
    const hotelId = h.id || h.hotel_id || h.ID;
    const stars   = parseInt(h.stars) || 4;
    const starsHtml = [1,2,3,4,5].map(s => `<span class="star${s > stars ? ' empty' : ''}">★</span>`).join('');
    const rating  = h.avg_rating ? parseFloat(h.avg_rating).toFixed(1) : '—';
    const price   = parseFloat(String(h.price||0).replace(',','.')) || 0;
    const desc    = (h.description || '').length > 90 ? h.description.substring(0, 90) + '...' : (h.description || '');

    // Parse image
    let imgStyle = '';
    if (h.image_url) {
      try {
        const parsed = JSON.parse(h.image_url);
        const url = Array.isArray(parsed) ? parsed[0] : h.image_url;
        if (url) imgStyle = `background-image:url('${url}'); opacity:1; font-size:0;`;
      } catch(e) {
        if (h.image_url.startsWith('http')) imgStyle = `background-image:url('${h.image_url}'); opacity:1; font-size:0;`;
      }
    }

    return `
      <div class="hotel-card" style="animation-delay:${i * 0.05}s">
        <div class="card-img">
          <div class="card-img-inner" style="${imgStyle}">${imgStyle ? '' : '🏨'}</div>
          <div class="card-overlay"></div>
          <div class="card-badges">
            ${h.is_new ? '<span class="badge badge-dark">Nou</span>' : ''}
            ${parseFloat(h.avg_rating) >= 4.8 ? '<span class="badge badge-gold">Top Rated</span>' : ''}
          </div>
          <div class="card-stars">${starsHtml}</div>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <div class="card-location">${h.location || 'România'}</div>
            <div class="card-rating">
              <span class="rating-val">★ ${rating}</span>
              <span class="rating-cnt">(${h.review_count || 0})</span>
            </div>
          </div>
          <div class="card-name">${h.name}</div>
          <div class="card-desc">${desc}</div>
          <div class="card-footer">
            <div>
              <div class="price-from">de la</div>
              <span class="price-amount">${price}</span>
              <span class="price-night"> RON/noapte</span>
            </div>
            <div class="card-actions">
              <a href="detalii_hotel.html?id=${hotelId}" class="btn-details" title="Detalii">◎</a>
              <a href="rezervare.html?hotel_id=${hotelId}" class="btn-reserve">Rezervă</a>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── PAGINATION ──
  function renderPagination() {
    const total = Math.ceil(filtered.length / PER_PAGE);
    const pg    = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
      if (total > 7 && i > 2 && i < total-1 && Math.abs(i - currentPage) > 1) {
        if (i === 3 || i === total-2) html += `<span style="color:var(--text-faint);padding:0 6px;">…</span>`;
        continue;
      }
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    pg.innerHTML = html;
  }

  function goPage(page) {
    const total = Math.ceil(filtered.length / PER_PAGE);
    if (page < 1 || page > total) return;
    currentPage = page;
    renderResults();
    renderPagination();
    window.scrollTo({ top: 200, behavior: 'smooth' });
  }

  // ── FILTER HELPERS ──
  function toggleStar(val, el) {
    el.classList.toggle('active');
    const check = el.querySelector('.star-check');
    if (el.classList.contains('active')) { selectedStars.add(val); check.textContent = '✓'; }
    else { selectedStars.delete(val); check.textContent = ''; }
    applyFilters();
  }

  function toggleLocation(loc, el) {
    document.querySelectorAll('.location-item').forEach(i => i.classList.remove('active'));
    if (selectedLoc === loc) { selectedLoc = null; }
    else { selectedLoc = loc; el.classList.add('active'); }
    applyFilters();
  }

  function resetAll() {
    document.getElementById('search-input').value = '';
    document.getElementById('price-min').value    = '';
    document.getElementById('price-max').value    = '';
    document.getElementById('sort-select').value  = 'default';
    selectedStars.clear();
    selectedLoc = null;
    document.querySelectorAll('.star-option').forEach(el => { el.classList.remove('active'); el.querySelector('.star-check').textContent = ''; });
    document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
    applyFilters();
  }

  function renderActivePills() {
    const container = document.getElementById('active-filters');
    const pills = [];
    const q = document.getElementById('search-input').value.trim();
    if (q) pills.push({ label: `"${q}"`, clear: () => { document.getElementById('search-input').value = ''; applyFilters(); } });
    if (selectedLoc) pills.push({ label: selectedLoc, clear: () => { selectedLoc = null; document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active')); applyFilters(); } });
    selectedStars.forEach(s => pills.push({ label: `${s} ★`, clear: () => { selectedStars.delete(s); document.querySelector(`.star-option input[value="${s}"]`)?.closest('.star-option')?.classList.remove('active'); applyFilters(); } }));
    const pMin = document.getElementById('price-min').value;
    const pMax = document.getElementById('price-max').value;
    if (pMin || pMax) pills.push({ label: `${pMin||'0'} – ${pMax||'∞'} RON`, clear: () => { document.getElementById('price-min').value=''; document.getElementById('price-max').value=''; applyFilters(); } });

    container.innerHTML = pills.map((p, i) => `
      <div class="filter-pill">
        ${p.label}
        <span class="filter-pill-x" onclick="clearPill(${i})">✕</span>
      </div>`).join('');

    // Store clear functions
    container._pills = pills;
  }

  function clearPill(i) {
    const pills = document.getElementById('active-filters')._pills;
    if (pills && pills[i]) pills[i].clear();
  }

  // ── VIEW TOGGLE ──
  function setView(v) {
    currentView = v;
    document.getElementById('grid-btn').classList.toggle('active', v === 'grid');
    document.getElementById('list-btn').classList.toggle('active', v === 'list');
    renderResults();
  }

  init();
</script>
</body>
</html>
